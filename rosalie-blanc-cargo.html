<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#0A0A08;--beige:#E8DFC8;--beige-dim:#9A8C78;

html,body{height:100%;background:var(--black);color:var(--beige);font-family:var(--g);overflow-x:hidden;}
.page{display:none;}
#home.active{display:flex;}
#work.active,#about.active,#contact.active{display:block;}

/* HOME */
#home{min-height:100vh;flex-direction:column;align-items:center;}
.home-name-wrap{width:100%;text-align:center;padding:44px 48px 0;}
.home-name{font-family:var(--g);font-size:clamp(48px,7.5vw,100px);font-weight:300;letter-spacing:0.12em;text-transform:uppercase;color:var(--beige);line-height:1;opacity:0;transform:translateY(6px);animation:fadeUp 1.3s ease forwards 0.1s;}
.home-nav{width:100%;display:flex;justify-content:center;gap:48px;list-style:none;padding:16px 0;margin-top:14px;border-top:0.5px solid var(--line);border-bottom:0.5px solid var(--line);}
.home-nav a{font-family:var(--g);font-size:11px;font-weight:400;letter-spacing:0.32em;text-transform:uppercase;color:var(--beige-dim);text-decoration:none;transition:color 0.3s;}
.home-nav a:hover,.home-nav a.active{color:var(--beige);}
.home-image-wrap{width:100%;max-width:1100px;padding:40px 52px 0;flex:1;}
.hero-placeholder{width:100%;aspect-ratio:16/9;background:#141210;display:flex;align-items:center;justify-content:center;}
.hero-placeholder p{font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--beige-faint);}
.hero-img{width:100%;max-height:72vh;object-fit:cover;display:block;filter:sepia(0.12) contrast(1.04);}
.home-footer{width:100%;text-align:center;padding:36px 0 28px;margin-top:40px;border-top:0.5px solid var(--line);}
.home-footer p{font-family:var(--g);font-size:11px;letter-spacing:0.18em;color:var(--beige-faint);}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

/* INNER NAV */
.inner-nav{display:flex;justify-content:space-between;align-items:center;padding:26px 52px;border-bottom:0.5px solid var(--line);position:sticky;top:0;background:var(--black);z-index:10;}
.inner-nav-logo{font-family:var(--g);font-size:13px;font-weight:300;letter-spacing:0.24em;text-transform:uppercase;color:var(--beige-dim);cursor:pointer;transition:color 0.3s;background:none;border:none;padding:0;}
.inner-nav-logo:hover{color:var(--beige);}
.inner-nav-links{display:flex;gap:44px;list-style:none;}
.inner-nav-links a{font-family:var(--g);font-size:11px;font-weight:400;letter-spacing:0.3em;text-transform:uppercase;color:var(--beige-dim);text-decoration:none;transition:color 0.3s;}
.inner-nav-links a:hover,.inner-nav-links a.active{color:var(--beige);}

/* WORK */
#work{padding-bottom:80px;min-height:100vh;}
.work-body{padding:60px 52px 0;}
.work-section{margin-bottom:72px;}
.work-section-header{display:flex;align-items:baseline;gap:24px;margin-bottom:36px;padding-bottom:14px;border-bottom:0.5px solid var(--line);}
.work-section-title{font-family:var(--g);font-size:28px;font-style:italic;font-weight:300;color:var(--beige);}
.work-section-count{font-family:var(--g);font-size:11px;letter-spacing:0.24em;text-transform:uppercase;color:var(--beige-dim);}
.work-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
.work-thumb{position:relative;aspect-ratio:4/5;overflow:hidden;cursor:pointer;background:#181410;}
.work-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.7s ease,opacity 0.7s ease;filter:sepia(0.12) contrast(1.04);}
.work-thumb:hover img{transform:scale(1.03);opacity:0.4;}
.thumb-placeholder{width:100%;height:100%;background:#181410;display:block;}
.work-thumb-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity 0.45s ease;text-align:center;padding:20px;pointer-events:none;}
.work-thumb:hover .work-thumb-label{opacity:1;}
.work-thumb-series{font-family:var(--g);font-size:22px;font-style:italic;font-weight:300;color:var(--beige);letter-spacing:0.04em;line-height:1.3;}
.work-thumb-year{margin-top:8px;font-family:var(--g);font-size:11px;letter-spacing:0.26em;text-transform:uppercase;color:var(--beige-dim);}

/* ABOUT */
#about{padding-bottom:80px;min-height:100vh;}
.about-body{padding:60px 52px 0;display:grid;grid-template-columns:1fr 1.7fr;gap:80px;align-items:start;max-width:1040px;}
.about-img-placeholder{width:100%;aspect-ratio:3/4;background:#181410;}
.about-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;filter:sepia(0.15) contrast(1.04);}
.about-caption{margin-top:12px;font-family:var(--g);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--beige-dim);}
.about-text h2{font-family:var(--g);font-size:32px;font-style:italic;font-weight:300;color:var(--beige);margin-bottom:28px;line-height:1.2;}
.about-text p{font-family:var(--g);font-size:18px;line-height:1.85;color:var(--beige);margin-bottom:18px;}
.about-text p.muted{color:var(--beige-dim);font-size:15px;}
.about-divider{width:28px;height:0.5px;background:var(--beige-dim);margin:28px 0;}

/* CONTACT */
#contact{padding-bottom:80px;min-height:100vh;}
.contact-body{padding:60px 52px;}
.contact-title{font-family:var(--g);font-size:44px;font-style:italic;font-weight:300;color:var(--beige);margin-bottom:48px;line-height:1.1;}
.contact-row{display:flex;flex-direction:column;gap:26px;}
.contact-item{border-top:0.5px solid var(--line);padding-top:18px;}
.contact-label{font-family:var(--g);font-size:11px;letter-spacing:0.28em;text-transform:uppercase;color:var(--beige-dim);margin-bottom:8px;}
.contact-value{font-family:var(--g);font-size:20px;font-style:italic;font-weight:300;color:var(--beige);text-decoration:none;transition:color 0.3s;display:inline-block;}
.contact-value:hover{color:var(--beige-hover);}

@media(max-width:900px){
  .inner-nav{padding:20px 28px;}.inner-nav-links{gap:28px;}
  .work-body,.about-body,.contact-body{padding-left:28px;padding-right:28px;}
  .home-image-wrap{padding:28px 28px 0;}
  .work-grid{grid-template-columns:repeat(2,1fr);}
  .about-body{grid-template-columns:1fr;gap:36px;}
}
@media(max-width:500px){
  .home-nav{gap:20px;}.work-grid{grid-template-columns:1fr;}
}
</style>
</head>

<script>
function showPage(id){
  ['home','work','about','contact'].forEach(function(p){
    var el=document.getElementById(p);
    el.classList.remove('active');el.style.display='none';
  });
  ['home','about','work','contact'].forEach(function(n){
    var el=document.getElementById('hn-'+n);
    if(el)el.classList.remove('active');
  });
  var t=document.getElementById(id);
  t.classList.add('active');
  t.style.display=(id==='home')?'flex':'block';
  var hn=document.getElementById('hn-'+id);
  if(hn)hn.classList.add('active');
  window.scrollTo(0,0);
}
